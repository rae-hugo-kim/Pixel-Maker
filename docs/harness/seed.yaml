version: 4
status: draft

goal: >
  격자선이 포함된 고해상도 이미지에서 격자를 자동 감지하고, 각 셀의 중심 색상을
  샘플링하여 순수 NxN 픽셀아트를 추출하는 Python CLI 도구 및 MCP 서버를 만든다.
  게임 개발자가 격자 이미지를 넣으면 격자 없는 깨끗한 픽셀아트를 즉시 얻을 수 있어야 한다.

constraints:
  - Python + Pillow 기반으로 구현한다
  - 핵심은 격자선 감지 → 셀 중심 샘플링 → 순수 픽셀아트 추출이다
  - 원본 색상을 그대로 보존하는 것이 원칙이다 (팔레트 양자화는 opt-in 옵션)
  - scale 옵션은 추출 후 확대이며, 변환 시 픽셀 크기 지정이 아니다
  - CLI 명령어는 extract이다 (convert 아님)
  - MCP 툴 이름은 extract_pixel_art이다
  - 힌트 충돌 시(--grid-size + --ref 불일치) GridHintConflictError를 발생시킨다
  - 자동 감지 결과와 --grid-size 충돌 시에도 GridHintConflictError를 발생시킨다 (조용한 오추출 방지)
  - --force-grid-size로만 자동 감지를 명시적으로 무시할 수 있다
  - 격자 미감지 + 힌트 없음 시 GridNotDetectedError를 발생시킨다
  - CLI는 agent가 사용하기 쉬운 형태여야 한다
  - MCP 서버로 배포 가능한 구조여야 한다
  - 4K+(4096x4096) 입력 처리 시 5초 이하, peak RSS 512MB 이하

acceptance_criteria:
  - 균일 격자(1px 검은 선) 포함 고해상도 이미지에서 격자선을 자동 감지한다 (신뢰도 > 0.9)
  - 감지된 격자 기반으로 각 셀 중심 색상을 샘플링하여 정확한 NxN 픽셀아트를 추출한다
  - 무손실 입력 시 추출 색상이 원본과 완전 일치한다 (불일치 픽셀 = 0)
  - 손실 포맷(JPEG quality=85) 입력 시 채널당 오차 ≤ 3, 불일치 픽셀 < 5%
  - 출력 이미지의 각 픽셀이 선명한 경계를 가지며 안티앨리어싱/블러가 없다
  - 힌트 없음/있음/fallback/충돌/force 규칙이 일관되게 동작한다
  - 자동 감지와 --grid-size 충돌 시 에러가 발생하며, --force-grid-size로만 override 가능하다
  - CLI로 pixelmaker extract <input> <output> --options 형태로 실행 가능하다
  - CLI에서 에러/경고가 stderr로 출력되고 적절한 종료 코드를 반환한다
  - MCP 서버로 extract_pixel_art 툴을 제공하며 agent가 호출 가능하다
  - MCP 결과에 confidence, grid_detected, fallback_used, grid_size, unique_colors, warnings 메타데이터가 의미 있게 포함된다
  - PNG 투명 배경, JPG, BMP, WebP 등 다양한 입력 포맷을 지원한다
  - 그레이스케일 입력이 정상 처리된다
  - 4096x4096 입력을 5초 이하, peak RSS 512MB 이하로 처리한다

out_of_scope:
  - 실시간 프리뷰
  - 클라우드 배포
  - 애니메이션(GIF/스프라이트시트) 지원
  - 임의 이미지를 픽셀아트 스타일로 변환하는 기능 (다른 도구)

assumptions:
  - Python 3.10+ 환경에서 실행된다
  - Pillow로 충분한 이미지 처리가 가능하다 (OpenCV 불필요)
  - MCP SDK(Python, mcp[cli] 패키지)가 사용 가능하다
  - 입력 이미지의 격자선은 주로 검은색 또는 어두운 색의 1px 직선이다

risks:
  - 불균일 격자(±1px 흔들림)에서 감지 정확도가 떨어질 수 있다
  - JPEG 압축 아티팩트가 격자선 감지를 방해할 수 있다
  - 투명 배경 + 검은 격자선 조합에서 오감지 가능성
  - 셀 내부에 격자선보다 어두운 픽셀이 있을 때 오분류 가능성
  - 불균일 격자선 두께(가장자리 2px + 내부 1px)에서 샘플링 오차 가능성
  - 4K+ 이미지 처리 시 메모리 사용량이 클 수 있다
  - MCP SDK Python 버전의 안정성/호환성 확인 필요

